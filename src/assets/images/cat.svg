<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Astronaut helmet glass -->
  <circle cx="100" cy="82" r="52" fill="#0D1B4B" opacity="0.5"/>
  <circle cx="100" cy="82" r="50" fill="none" stroke="#7EB8F7" stroke-width="4"/>

  <!-- Helmet reflection -->
  <ellipse cx="82" cy="60" rx="10" ry="6" fill="white" opacity="0.15" transform="rotate(-20,82,60)"/>

  <!-- Body - spacesuit -->
  <ellipse cx="100" cy="163" rx="52" ry="48" fill="#3B4FCB"/>
  <!-- Suit detail -->
  <ellipse cx="100" cy="163" rx="28" ry="26" fill="#2A3AA8"/>
  <!-- Chest badge -->
  <circle cx="100" cy="155" r="10" fill="#7EB8F7" opacity="0.6"/>
  <text x="100" y="159" text-anchor="middle" font-size="10" fill="white">🐾</text>

  <!-- Head -->
  <circle cx="100" cy="82" r="44" fill="#6B4FD8"/>

  <!-- Ears -->
  <polygon points="63,48 52,12 88,40" fill="#6B4FD8"/>
  <polygon points="66,46 57,18 85,42" fill="#9B7FFF"/>

  <polygon points="137,48 148,12 112,40" fill="#6B4FD8"/>
  <polygon points="134,46 143,18 115,42" fill="#9B7FFF"/>

  <!-- Star on ears -->
  <text x="57" y="35" font-size="10" fill="#FFD700">★</text>
  <text x="133" y="35" font-size="10" fill="#FFD700">★</text>

  <!-- Face -->
  <!-- Left eye - galaxy eye -->
  <circle cx="82" cy="78" r="11" fill="#0D0D2B"/>
  <circle cx="82" cy="78" r="8" fill="#1A0A4B"/>
  <circle cx="84" cy="76" r="5" fill="#7B2FFF"/>
  <circle cx="84" cy="76" r="3" fill="#2D0080"/>
  <circle cx="86" cy="74" r="1.5" fill="white"/>
  <!-- Star sparkle in eye -->
  <circle cx="80" cy="80" r="1" fill="white" opacity="0.7"/>

  <!-- Right eye - galaxy eye -->
  <circle cx="118" cy="78" r="11" fill="#0D0D2B"/>
  <circle cx="118" cy="78" r="8" fill="#1A0A4B"/>
  <circle cx="120" cy="76" r="5" fill="#7B2FFF"/>
  <circle cx="120" cy="76" r="3" fill="#2D0080"/>
  <circle cx="122" cy="74" r="1.5" fill="white"/>
  <circle cx="116" cy="80" r="1" fill="white" opacity="0.7"/>

  <!-- Nose -->
  <polygon points="100,92 95,99 105,99" fill="#C084FC"/>

  <!-- Mouth -->
  <path d="M95,99 Q100,106 105,99" stroke="#A855F7" stroke-width="1.5" fill="none"/>
  <path d="M88,104 Q95,110 100,107" stroke="#A855F7" stroke-width="1.5" fill="none"/>
  <path d="M112,104 Q105,110 100,107" stroke="#A855F7" stroke-width="1.5" fill="none"/>

  <!-- Whiskers with star tips -->
  <line x1="86" y1="97" x2="50" y2="91" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <line x1="86" y1="100" x2="50" y2="100" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <line x1="86" y1="103" x2="52" y2="109" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <text x="44" y="94" font-size="8" fill="#FFD700">✦</text>
  <text x="44" y="103" font-size="8" fill="#FFD700">✦</text>
  <text x="46" y="113" font-size="8" fill="#FFD700">✦</text>

  <line x1="114" y1="97" x2="150" y2="91" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <line x1="114" y1="100" x2="150" y2="100" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <line x1="114" y1="103" x2="148" y2="109" stroke="#C084FC" stroke-width="1.2" opacity="0.8"/>
  <text x="150" y="94" font-size="8" fill="#FFD700">✦</text>
  <text x="150" y="103" font-size="8" fill="#FFD700">✦</text>
  <text x="148" y="113" font-size="8" fill="#FFD700">✦</text>

  <!-- Cheek nebula blush -->
  <circle cx="68" cy="92" r="11" fill="#FF6EC7" opacity="0.25"/>
  <circle cx="132" cy="92" r="11" fill="#FF6EC7" opacity="0.25"/>

  <!-- Head star decorations -->
  <text x="88" y="52" font-size="9" fill="#FFD700">★</text>
  <text x="104" y="48" font-size="7" fill="#C084FC">✦</text>
  <text x="115" y="55" font-size="9" fill="#FFD700">★</text>

  <!-- Arms - spacesuit -->
  <ellipse cx="53" cy="163" rx="14" ry="28" fill="#3B4FCB" transform="rotate(-15,53,163)"/>
  <ellipse cx="43" cy="187" rx="13" ry="9" fill="#2A3AA8"/>

  <ellipse cx="147" cy="163" rx="14" ry="28" fill="#3B4FCB" transform="rotate(15,147,163)"/>
  <ellipse cx="157" cy="187" rx="13" ry="9" fill="#2A3AA8"/>

  <!-- Legs -->
  <ellipse cx="78" cy="205" rx="18" ry="13" fill="#2A3AA8"/>
  <ellipse cx="122" cy="205" rx="18" ry="13" fill="#2A3AA8"/>

  <!-- Tail - cosmic -->
  <path d="M148,178 Q188,158 178,122 Q168,92 150,108" stroke="#7B2FFF" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M148,178 Q188,158 178,122 Q168,92 150,108" stroke="#C084FC" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Tiny stars on body -->
  <text x="90" y="168" font-size="8" fill="white" opacity="0.7">✦</text>
  <text x="108" y="172" font-size="6" fill="#C084FC" opacity="0.8">★</text>
  <text x="96" y="180" font-size="6" fill="white" opacity="0.6">·</text>

  <!-- Helmet ring -->
  <ellipse cx="100" cy="126" rx="48" ry="8" fill="#3B4FCB" opacity="0.8"/>
  <ellipse cx="100" cy="126" rx="48" ry="8" fill="none" stroke="#7EB8F7" stroke-width="2"/>
</svg>
